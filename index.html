<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Helden Hoofdkwartier — Missie 1: De Vloedgolf</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Special+Elite&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="game">

    <!-- Top-left: Mission briefing -->
    <div id="briefing-box" class="caption-box">
      <div class="caption-title">HOOFDKWARTIER</div>
      <div id="briefing-text"></div>
      <div id="phase-indicator"></div>
    </div>

    <!-- Top-right: Turn + End Turn -->
    <div id="turn-box">
      <div id="turn-counter">BEURT <span id="turn-number">1</span></div>
      <div id="score-display">SCORE: <span id="score-number">100</span></div>
      <button id="end-turn-btn" class="chunky-btn">EINDE<br>BEURT</button>
    </div>

    <!-- Center: Cardboard map -->
    <div id="map-wrapper">
      <div id="map">
        <svg id="nl-outline" viewBox="0 0 500 580" preserveAspectRatio="xMidYMid meet">
          <!-- Water -->
          <rect x="0" y="0" width="500" height="580" fill="#7fb5d5"/>

          <!-- Main land mass — traced from NL geography -->
          <path d="
            M145,110
            L165,118 L185,120 L200,125
            Q215,115 230,108 L260,98 L290,90
            L320,86 L350,83 L370,82 L395,76
            Q410,78 420,85 L425,95
            L420,120 L415,148 L412,175
            L418,205 L428,232 L438,252
            Q442,262 438,275
            L425,298 L415,322 L400,342
            L388,355 L375,363
            L372,382 L378,408 L383,435 L380,465
            L375,492 L367,515 L358,528
            Q350,538 340,530
            L344,508 L348,478 L350,448
            L350,418 L348,395 L340,378
            L315,372 L285,368 L255,365
            L225,363 L195,360 L170,362
            L148,370 L132,380
            L118,392 L105,408 L95,418
            Q88,425 82,430
            L78,435
            Q72,432 75,425
            L82,415 L90,402
            L85,388 L80,370
            L75,348 L72,325 L70,300
            Q68,280 70,262
            L72,242 L75,222
            L80,198 L88,172
            L98,150 L112,132 L130,118
            Z
          " fill="#e07b10" stroke="#2b1a0a" stroke-width="2.5" stroke-linejoin="round"/>

          <!-- Waddeneilanden -->
          <ellipse cx="165" cy="82" rx="25" ry="6" fill="#e07b10" stroke="#2b1a0a" stroke-width="1.5" transform="rotate(-5,165,82)"/>
          <ellipse cx="220" cy="72" rx="28" ry="6" fill="#e07b10" stroke="#2b1a0a" stroke-width="1.5" transform="rotate(-3,220,72)"/>
          <ellipse cx="280" cy="65" rx="30" ry="6" fill="#e07b10" stroke="#2b1a0a" stroke-width="1.5" transform="rotate(-2,280,65)"/>
          <ellipse cx="340" cy="62" rx="22" ry="5" fill="#e07b10" stroke="#2b1a0a" stroke-width="1.5" transform="rotate(0,340,62)"/>
          <ellipse cx="385" cy="60" rx="16" ry="4" fill="#e07b10" stroke="#2b1a0a" stroke-width="1.5" transform="rotate(3,385,60)"/>

          <!-- IJsselmeer -->
          <path d="
            M190,128 Q210,120 235,122
            Q260,126 275,145
            Q282,162 278,182
            Q270,200 252,208
            Q235,214 218,206
            Q202,198 195,178
            Q188,155 190,138 Z
          " fill="#7fb5d5" stroke="#2b1a0a" stroke-width="1.2" opacity="0.9"/>

          <!-- Zeeland delta waters -->
          <path d="M105,375 Q115,382 125,390 L115,398 Q105,390 98,382 Z" fill="#7fb5d5" stroke="#2b1a0a" stroke-width="0.8"/>
          <path d="M118,388 Q130,398 138,408 L128,416 Q120,406 112,396 Z" fill="#7fb5d5" stroke="#2b1a0a" stroke-width="0.8"/>

            <path d="M290,90 L285,120 L280,145"/>
            <path d="M280,145 L310,150 L340,152 L370,155"/>
            <path d="M275,182 L290,195 L305,205"/>
            <path d="M110,235 L145,240 L180,243 L210,245"/>

            <path d="M210,245 L225,275 L235,300 L225,325 L200,340"/>

          <!-- Province labels -->
          <g font-family="Special Elite, monospace" font-size="11" fill="#5a3418" opacity="0.4">
            <text x="200" y="112">FR</text>
            <text x="350" y="108">GR</text>
            <text x="360" y="175">DR</text>

          <g stroke="#5a9aba" stroke-width="1" fill="none" opacity="0.3">
            <path d="M20,150 Q30,145 40,150 Q50,155 60,150"/>
            <path d="M25,170 Q35,165 45,170 Q55,175 65,170"/>
            <path d="M30,300 Q40,295 50,300 Q60,305 70,300"/>
            <path d="M455,150 Q465,145 475,150"/>
            <path d="M450,200 Q460,195 470,200"/>
          </g>
        </svg>
        <div id="locations-layer"></div>
      </div>
    </div>

    <!-- Bottom: Hero hand -->
    <div id="hand"></div>

    <!-- Log panel -->
    <div id="log-panel">
      <div class="log-title">LOGBOEK</div>
      <ul id="log-list"></ul>
    </div>

    <!-- Notification banners -->
    <div id="notification-layer"></div>

    <!-- Modal root -->
    <div id="modal-root"></div>

  </div>

  <script src="data.js"></script>
  <script src="game.js"></script>
</body>
</html>
